<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justin Robinson</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
      line-height: 1.6;
      color: #111;
      background-color: #F8F5EC;
      border-bottom: 1px solid #cfc8b8;
    }

    nav {
      margin-bottom: 40px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      margin-right: 20px;
      text-decoration: none;
      color: #111;
      font-weight: 600;
    }

    .hero {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .photo {
      flex: 0 0 500px;
    }

    .photo img {
      width: 100%;
      border-radius: 6px;
      display: block;
    }

    .intro {
      flex: 1;
      padding-top: 10px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 3rem;
      line-height: 1.1;
    }

    .intro p {
      margin-top: 0;
      font-size: 1.1rem;
    }

    .bio {
      max-width: 820px;
      margin: 0 auto;
      padding-top: 10px;
    }

    .bio p {
      margin-bottom: 1.2em;
      font-size: 1.1rem;
    }

    .bio ul {
      margin: 0 0 1.2em 1.4em;
      padding: 0;
      font-size: 1.05rem;
    }

    .bio li {
      margin-bottom: 0.7em;
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
      }

      .photo {
        flex: 0 0 auto;
        max-width: 520px;
      }

      h1 {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="publications.html">Publications and Awards</a>
    <a href="contact.html">Contact</a>
    <a href="cv.pdf">CV</a>
  </nav>

</body>
</html>
